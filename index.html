<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pokopia 寶可夢圖鑑</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-left">
      <h1>🏝️ Pokopia 圖鑑</h1>
      <span class="header-badge" id="headerStats">共 303 隻</span>
    </div>
    <div class="header-right">
      <button class="header-btn" onclick="openCollectionStats()">📊 收集統計</button>
    </div>
  </div>
</header>

<div class="panel">
  <!-- Search row -->
  <div class="search-row">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="搜尋名稱或編號…" autocomplete="off">
    </div>
    <button class="clear-btn" onclick="clearAll()">清除篩選</button>
  </div>

  <!-- Toggles -->
  <div class="toggle-row">
    <label class="toggle"><input type="checkbox" id="showEvent" onchange="applyFilters()"><span>顯示活動限定</span></label>
    <label class="toggle"><input type="checkbox" id="showOnlyOwned" onchange="applyFilters()"><span>只顯示已捕獲</span></label>
  </div>

  <!-- Filter sections -->
  <div class="filters">
    <!-- 屬性 -->
    <div class="filter-row">
      <span class="filter-row-label">屬性</span>
      <div class="chips" id="typeFilter"></div>
    </div>
    <!-- 特長 -->
    <div class="filter-row">
      <span class="filter-row-label">特長</span>
      <div class="chips" id="specialtyFilter"></div>
    </div>
    <!-- 時間 -->
    <div class="filter-row">
      <span class="filter-row-label">時間</span>
      <div class="chips" id="timeFilter"></div>
    </div>
    <!-- 天氣 -->
    <div class="filter-row">
      <span class="filter-row-label">天氣</span>
      <div class="chips" id="weatherFilter"></div>
    </div>
    <!-- 環境 -->
    <div class="filter-row">
      <span class="filter-row-label">環境</span>
      <div class="chips" id="envFilter"></div>
    </div>
    <!-- 獲取方式 -->
    <div class="filter-row">
      <span class="filter-row-label">獲取</span>
      <div class="chips" id="obtainFilter"></div>
    </div>
    <!-- 分配區域 -->
    <div class="filter-row">
      <span class="filter-row-label">區域</span>
      <div class="chips" id="areaFilter"></div>
    </div>
  </div>
</div>

<!-- Results bar -->
<div class="results-bar">
  <span id="resultCount"></span>
  <div class="view-btns">
    <button id="btnGrid" class="vbtn active" onclick="setView('grid')">
      <svg viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
    </button>
    <button id="btnList" class="vbtn" onclick="setView('list')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
  </div>
</div>

<main id="pokemonGrid" class="grid-view"></main>

<!-- Detail Modal -->
<div id="modal" class="modal-overlay" onclick="closeModal(event)">
  <div class="modal-box" id="modalBox">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<!-- Collection Stats Modal -->
<div id="statsModal" class="modal-overlay" onclick="closeStats(event)">
  <div class="modal-box stats-box">
    <button class="modal-close" onclick="closeStats()">✕</button>
    <div id="statsContent"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
